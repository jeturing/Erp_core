# Edge protections
limit_req_zone $binary_remote_addr zone=api_per_ip:20m rate=20r/s;
limit_conn_zone $binary_remote_addr zone=conn_per_ip:20m;

upstream fastapi_backend {
    server 127.0.0.1:4443;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name 10.10.10.20 sajet.us *.sajet.us;

    server_tokens off;

    client_max_body_size 50M;
    client_body_timeout 15s;
    client_header_timeout 15s;
    keepalive_timeout 30s;
    send_timeout 30s;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "same-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # SvelteKit _app assets — immutable hashed files, cache aggressively
    location /_app/immutable/ {
        alias /var/www/html/static/spa/_app/immutable/;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    # SvelteKit _app (non-immutable)
    location /_app/ {
        alias /var/www/html/static/spa/_app/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # PWA service worker and manifest — no cache
    location = /sw.js {
        alias /var/www/html/static/spa/sw.js;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Service-Worker-Allowed "/";
    }

    location = /manifest.webmanifest {
        alias /var/www/html/static/spa/manifest.webmanifest;
        add_header Cache-Control "no-cache";
    }

    location = /registerSW.js {
        alias /var/www/html/static/spa/registerSW.js;
        add_header Cache-Control "no-cache";
    }

    # Favicon and icons
    location = /favicon.svg {
        alias /var/www/html/static/spa/favicon.svg;
        expires 7d;
    }

    location = /favicon.png {
        alias /var/www/html/static/spa/favicon.png;
        expires 7d;
    }

    location /icons/ {
        alias /var/www/html/static/spa/icons/;
        expires 7d;
    }

    # Vite logo
    location = /vite.svg {
        alias /var/www/html/static/spa/vite.svg;
        expires 7d;
    }

    # Legacy static assets (CSS, images, etc.)
    location /static/spa/assets/ {
        alias /var/www/html/static/spa/assets/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Other static files
    location /static/ {
        alias /var/www/html/static/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # Protect docs and schema from public exposure at edge
    location = /openapi.json { return 403; }
    location = /sajet-api-docs { return 403; }
    location = /sajet-api-redoc { return 403; }

    # API routes with explicit rate/connection limits and method restrictions
    location ^~ /api/ {
        limit_req zone=api_per_ip burst=40 nodelay;
        limit_conn conn_per_ip 60;

        limit_except GET POST PUT PATCH DELETE OPTIONS {
            deny all;
        }

        proxy_pass http://fastapi_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_read_timeout 90s;
        proxy_connect_timeout 10s;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Everything else goes to FastAPI (including SPA routes)
    location / {
        proxy_pass http://fastapi_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Disable direct access to sensitive files
    location ~ /\.git { deny all; }
    location ~ /requirements\.txt { deny all; }
    location ~ /\.env { deny all; }

    error_log /var/log/nginx/erp-core-error.log;
    access_log /var/log/nginx/erp-core-access.log;
}

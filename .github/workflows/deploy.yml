name: Deploy to SRV-Sajet (PCT 160)

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: '20'

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Type check
        working-directory: frontend
        run: npm run check

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Setup SSH agent
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          {
            echo "Host atenea-jump"
            echo "  HostName $ATENEA_HOST"
            echo "  User root"
            echo "  IdentityFile ~/.ssh/deploy_key"
            echo "  StrictHostKeyChecking no"
            echo "  ServerAliveInterval 60"
            echo "  ConnectTimeout 30"
          } >> ~/.ssh/config
        env:
          DEPLOY_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          ATENEA_HOST: ${{ secrets.ATENEA_HOST }}

      - name: Deploy frontend dist to PCT 160
        run: |
          tar czf - -C frontend/dist . | ssh atenea-jump \
            "pct exec 160 -- bash -c 'mkdir -p /var/www/erp-frontend && cd /var/www/erp-frontend && tar xzf - && echo FRONTEND_OK'"

      - name: Deploy backend code to PCT 160
        run: |
          tar czf - \
            --exclude='.git' \
            --exclude='frontend' \
            --exclude='**/__pycache__' \
            --exclude='**/*.pyc' \
            --exclude='.env' \
            app/ requirements.txt static/ \
          | ssh atenea-jump \
            "pct exec 160 -- bash -c 'cd /opt/Erp_core && tar xzf - 2>/dev/null && echo BACKEND_OK'"

      - name: Install deps and restart service
        run: |
          ssh atenea-jump "pct exec 160 -- bash -c '
            /opt/Erp_core/venv/bin/pip install -r /opt/Erp_core/requirements.txt -q
            systemctl restart erp-core
            sleep 4
            systemctl is-active --quiet erp-core && echo SERVICE_OK || (systemctl status erp-core --no-pager; exit 1)
          '"

      - name: Reload nginx
        run: |
          ssh atenea-jump "pct exec 160 -- bash -c 'nginx -t && systemctl reload nginx && echo NGINX_OK'"

      - name: Health check
        run: |
          sleep 5
          ssh atenea-jump "pct exec 160 -- curl -sf http://127.0.0.1:4443/health && echo HEALTH_OK"
